name: Deploy To GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Angular for Pages
        shell: bash
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          OWNER_NAME="${{ github.repository_owner }}"

          if [ "$REPO_NAME" = "${OWNER_NAME}.github.io" ]; then
            BASE_HREF="/"
          else
            BASE_HREF="/${REPO_NAME}/"
          fi

          echo "Using base href: ${BASE_HREF}"
          npm run build -- --configuration production --base-href "${BASE_HREF}" --deploy-url "${BASE_HREF}"

      - name: Prepare publish directory
        shell: bash
        run: |
          DIST_ROOT="dist/golden-seal-life-sciences"

          if [ -f "${DIST_ROOT}/browser/index.html" ]; then
            PAGES_DIR="${DIST_ROOT}/browser"
          elif [ -f "${DIST_ROOT}/index.html" ]; then
            PAGES_DIR="${DIST_ROOT}"
          else
            echo "Unable to locate index.html in expected build output paths."
            find dist -maxdepth 4 -type f -name "index.html" || true
            exit 1
          fi

          echo "Using publish directory: ${PAGES_DIR}"
          echo "PAGES_DIR=${PAGES_DIR}" >> "$GITHUB_ENV"

          cp "${PAGES_DIR}/index.html" "${PAGES_DIR}/404.html"
          touch "${PAGES_DIR}/.nojekyll"

          if [ -f "CNAME" ]; then
            cp "CNAME" "${PAGES_DIR}/CNAME"
          fi

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ${{ env.PAGES_DIR }}
          force_orphan: true
