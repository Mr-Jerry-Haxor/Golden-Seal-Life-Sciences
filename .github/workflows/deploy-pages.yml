name: Deploy To GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Angular for Pages
        shell: bash
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          OWNER_NAME="${{ github.repository_owner }}"

          if [ "$REPO_NAME" = "${OWNER_NAME}.github.io" ]; then
            BASE_HREF="/"
          else
            BASE_HREF="/${REPO_NAME}/"
          fi

          echo "Using base href: ${BASE_HREF}"
          npm run build -- --configuration production --base-href "${BASE_HREF}" --deploy-url "${BASE_HREF}"

      - name: Configure SPA fallback and metadata
        shell: bash
        run: |
          DIST_DIR="dist/golden-seal-life-sciences"
          cp "${DIST_DIR}/index.html" "${DIST_DIR}/404.html"
          touch "${DIST_DIR}/.nojekyll"

          if [ -f "CNAME" ]; then
            cp "CNAME" "${DIST_DIR}/CNAME"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/golden-seal-life-sciences

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
