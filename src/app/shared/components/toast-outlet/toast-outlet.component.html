<section class="pointer-events-none fixed right-4 top-4 z-[120] grid w-[min(92vw,28rem)] gap-3" aria-live="polite" aria-atomic="true">
  @for (toast of toastItems(); track toast.id) {
    <article
      class="pointer-events-auto rounded-2xl border p-4 shadow-lg backdrop-blur-sm transition-all duration-300"
      [class.border-emerald-200]="toast.tone === 'success'"
      [class.bg-emerald-50/95]="toast.tone === 'success'"
      [class.text-emerald-900]="toast.tone === 'success'"
      [class.border-rose-200]="toast.tone === 'error'"
      [class.bg-rose-50/95]="toast.tone === 'error'"
      [class.text-rose-900]="toast.tone === 'error'"
      [class.border-amber-200]="toast.tone === 'warning'"
      [class.bg-amber-50/95]="toast.tone === 'warning'"
      [class.text-amber-900]="toast.tone === 'warning'"
      [class.border-slate-200]="toast.tone === 'info'"
      [class.bg-white/95]="toast.tone === 'info'"
      [class.text-slate-800]="toast.tone === 'info'"
      role="status"
    >
      <div class="flex items-start gap-3">
        <span class="mt-0.5 inline-flex h-6 w-6 items-center justify-center rounded-full bg-slate-900/10 text-xs font-semibold">
          @if (toast.tone === 'success') {
            ✓
          } @else if (toast.tone === 'error') {
            !
          } @else if (toast.tone === 'warning') {
            !
          } @else {
            i
          }
        </span>

        <p class="flex-1 text-sm font-medium leading-relaxed">{{ toast.message }}</p>

        <button
          type="button"
          class="rounded-md p-1 text-xs font-semibold text-slate-500 transition-colors duration-300 hover:bg-slate-100 hover:text-slate-900 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-emerald-500"
          (click)="dismiss(toast.id)"
          [attr.aria-label]="'Dismiss notification: ' + toast.message"
        >
          ✕
        </button>
      </div>
    </article>
  }
</section>
